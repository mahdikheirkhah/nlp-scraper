name: NLP Scraper CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run Unit Tests'
        required: true
        type: boolean
        default: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Injecting Snowflake secrets so the engine initialization can be tested
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11.1
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.1'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Professional practice: install spaCy model here if not in requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Unit Tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests == true }}
        run: |
          # We run module-style to ensure 'scripts' is in the python path
          python -m pytest tests/

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Scraper & NLP Engine
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          # Executes the ingestion to Snowflake
          python scripts/scraper_news.py
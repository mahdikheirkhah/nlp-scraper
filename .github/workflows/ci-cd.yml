name: NLP Scraper CI/CD

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run Unit Tests'
        required: true
        type: boolean
        default: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # Explicitly set or use file
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 🚨 CRITICAL: Must use 'md' model for your 0.85 similarity logic to work
          python -m spacy download en_core_web_md

      - name: Run Unit Tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests == true }}
        run: |
          # Use -v for verbose output so you see which tests pass/fail in logs
          python -m pytest tests/ -v

  deploy-and-report:
    needs: build-and-test
    # Only deploy on main branch pushes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Full Analysis & Generate Reports
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_md
          # 1. Run the Scraper to get fresh data
          python scripts/scraper_news.py
          # 2. Run the NLP Engine to generate the CSV and Plots
          python scripts/process_snowflake_news.py

      - name: Archive Final Reports
        uses: actions/upload-artifact@v6
        with:
          name: nlp-intelligence-reports
          path: |
            enhanced_news.csv
            topic_distribution.png
            risk_distribution.png
          retention-days: 7